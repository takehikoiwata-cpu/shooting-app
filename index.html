
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=400, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>シューティングゲーム</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { max-width: 400px; margin: 0 auto; overflow: hidden; touch-action: none; }
body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
canvas { display: block; }
#ui { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 400px; display: flex; justify-content: space-between; padding: 10px; color: #fff; font-family: monospace; font-size: 16px; pointer-events: none; z-index: 10; }
#overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #fff; font-family: monospace; display: block; z-index: 20; }
#overlay h1 { font-size: 2rem; margin-bottom: 1rem; color: #6af; }
#overlay p { margin-bottom: 0.5rem; color: #aaa; }
#startBtn { margin-top: 1rem; padding: 12px 32px; background: #6366f1; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
#continueBtn { margin-top: 1rem; padding: 12px 32px; background: #22c55e; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
#joystick-area { position: fixed; bottom: 30px; left: 30px; width: 120px; height: 120px; pointer-events: all; z-index: 10; }
#joystick-base { width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); position: absolute; }
#joystick-stick { width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.4); border: 2px solid rgba(255,255,255,0.6); position: absolute; top: 35px; left: 35px; pointer-events: none; }
#ctrl-fire { position: fixed; bottom: 45px; right: 40px; width: 80px; height: 80px; border-radius: 50%; background: rgba(99,102,241,0.5); border: 2px solid rgba(255,255,255,0.4); display: flex; align-items: center; justify-content: center; font-size: 28px; color: #fff; pointer-events: all; z-index: 10; user-select: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <span id="score">SCORE: 0</span>
  <span id="lives">❤️❤️❤️</span>
  <span id="level">LEVEL: 1</span>
</div>
<div id="overlay">
  <h1>🚀 SHOOTER</h1>
  <p>← → ↑ ↓ キーで移動</p>
  <p>スペースで射撃</p>
  <p>スマホ：左スティックで移動、右ボタンで射撃</p>
  <button id="startBtn">ゲームスタート</button>
</div>
<div id="joystick-area">
  <div id="joystick-base"></div>
  <div id="joystick-stick"></div>
</div>
<div id="ctrl-fire">🔥</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 400, H = 700;
canvas.width = W;
canvas.height = H;

let score, lives, level, gameRunning;
let player, bullets, enemies, enemyBullets, particles, boss, items;
let keys = {};
let shooting = false;
let spawnTimer, bossActive, nextBossScore;
let powerUp = false;
let powerUpTimer = 0;
let bossAlertTimer = 0;
let joystickActive = false;
let joystickDX = 0, joystickDY = 0;

function initGame() {
  score = 0; lives = 3; level = 1; gameRunning = false;
  bullets = []; enemies = []; enemyBullets = []; particles = []; items = [];
  boss = null; bossActive = false; spawnTimer = 0; nextBossScore = 300;
  powerUp = false; powerUpTimer = 0; bossAlertTimer = 0;
  player = { x: W/2, y: H-180, w: 36, h: 36, speed: 5, shootCooldown: 0 };
  updateUI();
}

function updateUI() {
  document.getElementById('score').textContent = 'SCORE: ' + score;
  document.getElementById('lives').textContent = '❤️'.repeat(Math.max(0, lives));
  document.getElementById('level').textContent = 'LEVEL: ' + level;
}

function spawnEnemy() {
  const types = ['normal','fast','zigzag','tank'];
  const weights = [50, 25, 15, 10];
  let r = Math.random() * 100, type = 'normal', acc = 0;
  for (let i = 0; i < types.length; i++) { acc += weights[i]; if (r < acc) { type = types[i]; break; } }
  const colors = { normal:'#f55', fast:'#fa0', zigzag:'#a5f', tank:'#5af' };
  const hps = { normal:1, fast:1, zigzag:2, tank:4 };
  const speeds = { normal:1.5+level*0.2, fast:3+level*0.1, zigzag:1.5, tank:0.8 };
  enemies.push({
    x: 30 + Math.random() * (W-60), y: -30,
    w: 32, h: 32, type, color: colors[type],
    hp: hps[type], maxHp: hps[type],
    speed: speeds[type], shootTimer: 60 + Math.random()*60
  });
}

function spawnBoss() {
  bossActive = true;
  const hp = 20 + level * 15;
  const bossType = ((level - 1) % 5) + 1;
  const names = ['', 'HEXAGON', 'U.F.O.', 'ARACHNO', 'CYCLOPS', 'DRAGON'];
  boss = { x: W/2, y: 80, w: 72, h: 56, hp, maxHp: hp, dir: 1, speed: 1.5 + level*0.3, shootTimer: 0, angle: 0, phase: 1, type: bossType, name: names[bossType] };
}

function spawnItem(x, y, type) {
  items.push({ x, y, w: 20, h: 20, vy: 1.5, type });
}

function addParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({ x, y, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6, life: 1, color });
  }
}

function overlap(a, b) {
  return Math.abs(a.x - b.x) < (a.w + b.w)/2 && Math.abs(a.y - b.y) < (a.h + b.h)/2;
}

function update() {
  if (keys['ArrowLeft'])  player.x -= player.speed;
  if (keys['ArrowRight']) player.x += player.speed;
  if (keys['ArrowUp'])    player.y -= player.speed;
  if (keys['ArrowDown'])  player.y += player.speed;

  if (joystickActive) {
    player.x += joystickDX * player.speed;
    player.y += joystickDY * player.speed;
  }

  player.x = Math.max(20, Math.min(W-20, player.x));
  player.y = Math.max(20, Math.min(H-20, player.y));

  if (keys[' '] || shooting) {
    if (player.shootCooldown <= 0) {
      if (powerUp) {
        bullets.push({ x: player.x - 10, y: player.y-20, w: 6, h: 14, speed: 10 });
        bullets.push({ x: player.x + 10, y: player.y-20, w: 6, h: 14, speed: 10 });
      } else {
        bullets.push({ x: player.x, y: player.y-20, w: 6, h: 14, speed: 10 });
      }
      player.shootCooldown = 10;
    }
  }
  if (player.shootCooldown > 0) player.shootCooldown--;

  for (let i = bullets.length-1; i >= 0; i--) {
    bullets[i].y -= bullets[i].speed;
    if (bullets[i].y < -20) bullets.splice(i, 1);
  }

  if (!bossActive) {
    spawnTimer++;
    const interval = Math.max(35, 80 - level*8);
    if (spawnTimer >= interval) { spawnTimer = 0; spawnEnemy(); }
  }

  if (!bossActive && score >= nextBossScore && enemies.length === 0) { spawnBoss(); bossAlertTimer = 120; }

  for (let i = enemies.length-1; i >= 0; i--) {
    const e = enemies[i];
    e.y += e.speed;
    if (e.type === 'zigzag') e.x += Math.sin(e.y / 25) * 2.5;
    e.x = Math.max(20, Math.min(W-20, e.x));
    e.shootTimer--;
    if (e.shootTimer <= 0) {
      e.shootTimer = e.type === 'tank' ? 45 : 90;
      const dx = player.x - e.x, dy = player.y - e.y;
      const dist = Math.sqrt(dx*dx+dy*dy) || 1;
      enemyBullets.push({ x:e.x, y:e.y, vx:dx/dist*2.5, vy:dy/dist*2.5, w:8, h:8 });
    }
    if (e.y > H+20) { enemies.splice(i, 1); continue; }
    if (overlap(e, { x:player.x, y:player.y, w:28, h:28 })) { enemies.splice(i, 1); playerHit(); }
  }

  if (boss) {
    boss.x += boss.dir * boss.speed;
    if (boss.x > W-50 || boss.x < 50) boss.dir *= -1;
    boss.angle += 0.03;
    boss.shootTimer++;
    if (boss.hp < boss.maxHp * 0.5) boss.phase = 2;
    if (boss.hp < boss.maxHp * 0.25) boss.phase = 3;
    const interval = boss.phase === 3 ? 18 : boss.phase === 2 ? 28 : 40;
    if (boss.shootTimer >= interval) {
      boss.shootTimer = 0;
      const count = boss.phase === 3 ? 8 : boss.phase === 2 ? 5 : 3;
      for (let i = 0; i < count; i++) {
        const a = Math.PI/2 + (i-(count-1)/2)*0.28;
        enemyBullets.push({ x:boss.x, y:boss.y+35, vx:Math.cos(a)*3.5, vy:Math.sin(a)*3.5, w:10, h:10 });
      }
    }
  }

  for (let i = enemyBullets.length-1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx; b.y += b.vy;
    if (b.y > H+20 || b.x < -20 || b.x > W+20) { enemyBullets.splice(i, 1); continue; }
    if (overlap(b, { x:player.x, y:player.y, w:28, h:28 })) { enemyBullets.splice(i, 1); playerHit(); }
  }

  for (let bi = bullets.length-1; bi >= 0; bi--) {
    let hit = false;
    for (let ei = enemies.length-1; ei >= 0; ei--) {
      if (overlap(bullets[bi], enemies[ei])) {
        hit = true;
        enemies[ei].hp--;
        addParticles(enemies[ei].x, enemies[ei].y, enemies[ei].color, 3);
        if (enemies[ei].hp <= 0) {
          const pts = {normal:10, fast:20, zigzag:30, tank:40};
          score += pts[enemies[ei].type] || 10;
          addParticles(enemies[ei].x, enemies[ei].y, enemies[ei].color, 10);
          if (enemies[ei].type === 'tank') spawnItem(enemies[ei].x, enemies[ei].y, 'power');
          if (enemies[ei].type === 'zigzag') spawnItem(enemies[ei].x, enemies[ei].y, 'life');
          enemies.splice(ei, 1);
          updateUI();
        }
        break;
      }
    }
    if (!hit && boss && overlap(bullets[bi], boss)) {
      hit = true;
      boss.hp--;
      addParticles(boss.x, boss.y, '#ff0', 4);
      if (boss.hp <= 0) {
        score += 200 + level*50;
        addParticles(boss.x, boss.y, '#ff0', 30);
        boss = null; bossActive = false;
        level++;
        nextBossScore = score + 300 + level*100;
        updateUI();
      }
    }
    if (hit) bullets.splice(bi, 1);
  }

  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.93; p.vy *= 0.93;
    p.life -= 0.04;
    if (p.life <= 0) particles.splice(i, 1);
  }

  for (let i = items.length-1; i >= 0; i--) {
    items[i].y += items[i].vy;
    if (items[i].y > H+20) { items.splice(i, 1); continue; }
    if (overlap(items[i], { x:player.x, y:player.y, w:36, h:36 })) {
      const type = items[i].type;
      items.splice(i, 1);
      if (type === 'power') {
        powerUp = true;
        powerUpTimer = 1800;
        addParticles(player.x, player.y, '#ff0', 15);
      } else if (type === 'life') {
        lives = Math.min(lives + 1, 5);
        addParticles(player.x, player.y, '#f55', 15);
        updateUI();
      }
    }
  }

  if (powerUp) {
    powerUpTimer--;
    if (powerUpTimer <= 0) powerUp = false;
  }
}

function playerHit() {
  lives--;
  addParticles(player.x, player.y, '#6af', 12);
  updateUI();
  if (lives <= 0) gameOver();
}

function gameOver() {
  gameRunning = false;
  const savedScore = score;
  const savedLevel = level;
  const o = document.getElementById('overlay');
  o.innerHTML = `
    <h1>GAME OVER</h1>
    <p>SCORE: ${score}</p>
    <p>LEVEL: ${level}</p>
    <button id="continueBtn">コンティニュー</button>
    <br><br>
    <button id="startBtn">最初から</button>
  `;
  o.style.display = 'block';
  document.getElementById('continueBtn').addEventListener('click', () => {
    bullets = []; enemies = []; enemyBullets = []; particles = []; items = [];
    boss = null; bossActive = false; spawnTimer = 0;
    lives = 3; score = savedScore; level = savedLevel;
    nextBossScore = savedScore + 300 + savedLevel * 100;
    powerUp = false; powerUpTimer = 0;
    player = { x: W/2, y: H-180, w: 36, h: 36, speed: 5, shootCooldown: 0 };
    gameRunning = true;
    o.style.display = 'none';
    updateUI();
  });
  document.getElementById('startBtn').addEventListener('click', startGame);
}

function drawPlayer() {
  ctx.save();
  ctx.translate(player.x, player.y);
  if (powerUp) { ctx.shadowColor = '#ff0'; ctx.shadowBlur = 16; }
  ctx.fillStyle = powerUp ? '#ff6' : '#6af';
  ctx.beginPath();
  ctx.moveTo(0,-20); ctx.lineTo(-16,16); ctx.lineTo(0,8); ctx.lineTo(16,16);
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'hsl('+(Date.now()/5%60+20)+',100%,60%)';
  ctx.beginPath();
  ctx.moveTo(-7,12); ctx.lineTo(0,26+Math.random()*6); ctx.lineTo(7,12);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  ctx.fillStyle = e.color;
  if (e.type === 'zigzag') {
    ctx.beginPath(); ctx.moveTo(0,-16); ctx.lineTo(16,16); ctx.lineTo(-16,16); ctx.closePath(); ctx.fill();
  } else if (e.type === 'tank') {
    ctx.fillRect(-16,-16,32,32);
    ctx.fillStyle='#fff3'; ctx.fillRect(-16,-16,32,6);
  } else {
    ctx.beginPath(); ctx.arc(0,0,14,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff4'; ctx.beginPath(); ctx.arc(-4,-4,5,0,Math.PI*2); ctx.fill();
  }
  if (e.maxHp > 1) {
    ctx.fillStyle='#333'; ctx.fillRect(-16,20,32,4);
    ctx.fillStyle='#0f0'; ctx.fillRect(-16,20,32*(e.hp/e.maxHp),4);
  }
  ctx.restore();
}

function drawBoss() {
  ctx.save();
  ctx.translate(boss.x, boss.y);
  const hue = Date.now() / 20 % 360;

  if (boss.type === 1) {
    // Hexagon Star
    ctx.fillStyle = `hsl(${hue},80%,50%)`;
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = i/6*Math.PI*2 + boss.angle;
      const r = i%2===0 ? 36 : 20;
      i===0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r) : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    }
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#fff3'; ctx.beginPath(); ctx.arc(0,0,12,0,Math.PI*2); ctx.fill();

  } else if (boss.type === 2) {
    // UFO
    ctx.fillStyle = `hsl(${hue},60%,35%)`;
    ctx.beginPath(); ctx.ellipse(0, 10, 42, 14, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = `hsl(${hue},70%,65%)`;
    ctx.beginPath(); ctx.ellipse(0, -2, 24, 20, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#aef8';
    ctx.beginPath(); ctx.ellipse(-6, -8, 10, 8, -0.3, 0, Math.PI*2); ctx.fill();
    for (let i = 0; i < 7; i++) {
      const a = i/7*Math.PI*2 + boss.angle;
      ctx.fillStyle = i%2===0 ? '#f44' : '#ff0';
      ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.arc(Math.cos(a)*34, Math.sin(a)*10+10, 4, 0, Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur = 0;

  } else if (boss.type === 3) {
    // Spider
    ctx.strokeStyle = `hsl(${hue},60%,45%)`;
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    for (let i = 0; i < 8; i++) {
      const a = i/8*Math.PI*2 + boss.angle * 0.3;
      const mx = Math.cos(a)*28, my = Math.sin(a)*28;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*18, Math.sin(a)*18);
      ctx.lineTo(mx, my);
      ctx.lineTo(mx + Math.cos(a+0.7)*22, my + Math.sin(a+0.7)*22);
      ctx.stroke();
    }
    ctx.fillStyle = `hsl(${hue},75%,35%)`;
    ctx.beginPath(); ctx.ellipse(0, 6, 18, 14, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = `hsl(${hue},80%,45%)`;
    ctx.beginPath(); ctx.arc(0, -10, 16, 0, Math.PI*2); ctx.fill();
    ctx.shadowColor = '#f00'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#f00';
    for (let i = -1; i <= 1; i+=2) {
      ctx.beginPath(); ctx.arc(i*7, -12, 5, 0, Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = '#ff0';
    for (let i = -1; i <= 1; i+=2) {
      ctx.beginPath(); ctx.arc(i*7, -12, 2, 0, Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur = 0;

  } else if (boss.type === 4) {
    // Cyclops Eye
    ctx.strokeStyle = `hsl(${hue},60%,45%)`;
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    for (let i = 0; i < 6; i++) {
      const a = i/6*Math.PI*2;
      const ox = Math.cos(a)*36, oy = Math.sin(a)*26;
      ctx.beginPath();
      ctx.moveTo(ox, oy);
      ctx.lineTo(ox + Math.cos(a+boss.angle)*18, oy + Math.sin(a+boss.angle)*18);
      ctx.stroke();
    }
    ctx.fillStyle = '#e8e8e8';
    ctx.beginPath(); ctx.ellipse(0, 0, 38, 28, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = `hsl(${hue},90%,38%)`;
    const ex = Math.cos(boss.angle)*8, ey = Math.sin(boss.angle*0.7)*8;
    ctx.beginPath(); ctx.arc(ex, ey, 17, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(ex, ey, 9, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff9';
    ctx.beginPath(); ctx.arc(ex-4, ey-5, 5, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#666'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(0, 0, 38, 28, 0, 0, Math.PI*2); ctx.stroke();

  } else {
    // Dragon
    ctx.fillStyle = `hsl(${hue},65%,28%)`;
    ctx.beginPath(); ctx.arc(0, 4, 30, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = `hsl(${hue},70%,42%)`;
    ctx.beginPath();
    ctx.moveTo(-20, -18); ctx.lineTo(-30, -50+Math.sin(boss.angle)*4); ctx.lineTo(-8, -20);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(20, -18); ctx.lineTo(30, -50+Math.sin(boss.angle)*4); ctx.lineTo(8, -20);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = `hsl(${hue},60%,55%)`;
    ctx.beginPath(); ctx.ellipse(0, 6, 22, 16, 0, 0, Math.PI*2); ctx.fill();
    ctx.shadowColor = '#f00'; ctx.shadowBlur = 14;
    ctx.fillStyle = '#f22';
    ctx.beginPath(); ctx.ellipse(-11, -6, 8, 6, -0.3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(11, -6, 8, 6, 0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff0';
    ctx.beginPath(); ctx.arc(-11, -6, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(11, -6, 3, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#eee';
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.moveTo(i*9-3, 22); ctx.lineTo(i*9, 36+Math.sin(boss.angle+i)*3); ctx.lineTo(i*9+3, 22);
      ctx.closePath(); ctx.fill();
    }
    ctx.fillStyle = `hsl(${hue},70%,45%)`;
    ctx.beginPath();
    ctx.moveTo(-30, 10); ctx.lineTo(-50, 20+Math.sin(boss.angle)*6); ctx.lineTo(-28, 20);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(30, 10); ctx.lineTo(50, 20+Math.sin(boss.angle)*6); ctx.lineTo(28, 20);
    ctx.closePath(); ctx.fill();
  }

  // HP bar (共通)
  ctx.fillStyle='#300'; ctx.fillRect(-36,46,72,8);
  ctx.fillStyle='#f00'; ctx.fillRect(-36,46,72*(boss.hp/boss.maxHp),8);
  ctx.fillStyle='#fff'; ctx.font='11px monospace'; ctx.textAlign='center';
  ctx.fillText('⚠ ' + boss.name + ' HP:' + boss.hp, 0, 68);
  ctx.restore();
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#fff';
  for (let i = 0; i < 60; i++) {
    const x = (i*137 + Date.now()/20) % W;
    const y = (i*97  + Date.now()/8)  % H;
    ctx.fillRect(x, y, i%4===0?2:1, i%4===0?2:1);
  }

  drawPlayer();
  enemies.forEach(drawEnemy);
  if (boss) drawBoss();

  items.forEach(item => {
    ctx.save();
    ctx.translate(item.x, item.y);
    if (item.type === 'power') {
      ctx.fillStyle = '#ff0';
      ctx.shadowColor = '#ff0';
      ctx.shadowBlur = 12;
      ctx.fillRect(-10, -10, 20, 20);
      ctx.fillStyle = '#000';
      ctx.shadowBlur = 0;
      ctx.font = 'bold 12px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('2x', 0, 4);
    } else if (item.type === 'life') {
      ctx.fillStyle = '#f55';
      ctx.shadowColor = '#f55';
      ctx.shadowBlur = 12;
      ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.shadowBlur = 0;
      ctx.font = 'bold 13px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('❤', 0, 5);
    }
    ctx.restore();
  });

  ctx.shadowColor = powerUp ? '#ff6' : '#ff0';
  ctx.shadowBlur = 8;
  ctx.fillStyle = powerUp ? '#ff6' : '#ff0';
  bullets.forEach(b => ctx.fillRect(b.x-3, b.y-7, 6, 14));
  ctx.shadowBlur = 0;

  ctx.shadowColor = '#f55'; ctx.shadowBlur = 6;
  ctx.fillStyle = '#f55';
  enemyBullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, Math.PI*2); ctx.fill(); });
  ctx.shadowBlur = 0;

  particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x-2, p.y-2, 4, 4); });
  ctx.globalAlpha = 1;

  if (powerUp) {
    ctx.fillStyle = '#ff0';
    ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('⚡ 2連射: ' + Math.ceil(powerUpTimer/60) + 's', 10, 58);
  }

  if (bossAlertTimer > 0) {
    bossAlertTimer--;
    const alpha = Math.min(1, bossAlertTimer / 30) * (bossAlertTimer % 20 < 10 ? 1 : 0.3);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#f44';
    ctx.font = 'bold 28px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('⚠ BOSS: ' + (boss ? boss.name : '') + ' ⚠', W/2, H/2 - 10);
    ctx.font = 'bold 14px monospace';
    ctx.fillStyle = '#faa';
    ctx.fillText('LEVEL ' + level, W/2, H/2 + 18);
    ctx.globalAlpha = 1;
  }
}

function loop() {
  if (gameRunning) update();
  draw();
  requestAnimationFrame(loop);
}

function startGame() {
  initGame();
  gameRunning = true;
  document.getElementById('overlay').style.display = 'none';
}

document.addEventListener('keydown', e => { keys[e.key] = true; if(e.key===' ') e.preventDefault(); });
document.addEventListener('keyup',   e => { keys[e.key] = false; });

const fireBtn = document.getElementById('ctrl-fire');
fireBtn.addEventListener('touchstart', e => { e.preventDefault(); shooting = true; }, {passive:false});
fireBtn.addEventListener('touchend',   e => { e.preventDefault(); shooting = false; }, {passive:false});

const joystickArea = document.getElementById('joystick-area');
const stick = document.getElementById('joystick-stick');

joystickArea.addEventListener('touchstart', e => {
  e.preventDefault();
  joystickActive = true;
}, {passive:false});

joystickArea.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = joystickArea.getBoundingClientRect();
  const cx = rect.left + 60, cy = rect.top + 60;
  const tx = e.touches[0].clientX - cx;
  const ty = e.touches[0].clientY - cy;
  const dist = Math.sqrt(tx*tx + ty*ty);
  const maxDist = 40;
  const nx = dist > maxDist ? tx/dist*maxDist : tx;
  const ny = dist > maxDist ? ty/dist*maxDist : ty;
  joystickDX = nx / maxDist;
  joystickDY = ny / maxDist;
  stick.style.left = (35 + nx) + 'px';
  stick.style.top  = (35 + ny) + 'px';
}, {passive:false});

joystickArea.addEventListener('touchend', e => {
  e.preventDefault();
  joystickActive = false;
  joystickDX = 0; joystickDY = 0;
  stick.style.left = '35px';
  stick.style.top  = '35px';
}, {passive:false});

document.getElementById('startBtn').addEventListener('click', startGame);
initGame();
loop();
</script>
</body>
</html>
